[[rules]]
id = "anthropic-api-key"
description = "Found an Anthropic API Key, posing a risk of unauthorized access to AI services and data manipulation."
regex = '''\bsk-ant-api03-[A-Za-z0-9_-]{20,100}[A-Za-z0-9_-]'''
entropy = 3.5
keywords = ["sk-ant-api", "anthropic"]

[[rules]]
id = "generic-password-catch-all"
description = "Generic rule to catch password assignments in configuration and code"
# (?:^|[^a-zA-Z]) prevents matching inside words like "compass" or "passed"
# Allows patterns like DB_PASSWORD, MYSQL_PASSWORD (underscore before PASSWORD is ok)
# Requires an assignment operator (=, :) immediately after the keyword
# Requires at least 8 characters for the password value
# Entropy 3.1 filters out low-randomness values like "abcdefgh" (entropy=3.0)
regex = '''(?i)(?:^|[^a-zA-Z])(?:password|passwd)\s*[=:]\s*['"]?([^\s'";\n\r]{8,50})['"]?'''
entropy = 3.1
keywords = ["password", "passwd"]
[[rules.allowlists]]
description = "Allow common false positives - patterns match the FULL regex match (e.g., password=value)"
regexes = [
    # Placeholder values that START with common placeholder words (password=placeholder, password=test123)
    '''(?i)(?:password|passwd)[=:]\s*['"]?(password|passwd|changeme|placeholder|example|test|dummy|fake|sample)[a-z0-9_]*['"]?$''',
    # Variable references as values
    '''(?i)(?:password|passwd)[=:]\s*['"]?\$\{[^}]+\}['"]?''',
    '''(?i)(?:password|passwd)[=:]\s*['"]?\$[A-Z_]+['"]?''',
    '''(?i)(?:password|passwd)[=:]\s*['"]?\{\{[^}]+\}\}['"]?''',
    # Command-line flags
    '''(?i)(?:password|passwd)[=:]\s*['"]?--?[a-z][a-z-]*['"]?''',
    # Numbers only (12345678...)
    '''(?i)(?:password|passwd)[=:]\s*['"]?[0-9]{8,}['"]?''',
    # Already redacted secrets - prevent cascade detection
    '''\[REDACTED_SECRET:[^\]]+\]''',
]

[[rules]]
id = "url-embedded-passwords"
description = "Catch passwords embedded in URLs (e.g., redis://:password@host or postgres://user:password@host)"
# Matches both ://:password@ (empty username) and ://user:password@ patterns
# Uses [^@\s]+ to capture passwords that might contain special chars, then @ followed by host
regex = '''(?i)://(?:[^:@\s]*:)([^@\s]{4,50})@[a-zA-Z0-9]'''
entropy = 0.5
keywords = ["://", "@"]

[[rules]]
id = "huawei-access-key-id"
description = "Detected a Huawei Cloud Access Key ID (AK), which could allow unauthorized access to Huawei Cloud services."
regex = '''\b[A-Z0-9]{20}\b'''
entropy = 3.5
keywords = ["huawei", "access key id", "accesskeyid", "access_key_id"]

[[rules]]
id = "huawei-secret-access-key"
description = "Detected a Huawei Cloud Secret Access Key (SK), which could allow unauthorized access to Huawei Cloud services and data."
regex = '''\b[A-Za-z0-9]{40}\b'''
entropy = 4.0
keywords = ["huawei", "secret access key", "secretaccesskey", "secret_access_key"]

[[rules]]
id = "telegram-bot-api-token"
description = "Detected a Telegram Bot API Token, risking unauthorized bot operations and message interception on Telegram."
regex = '''(?i)[\w.-]{0,50}?(?:telegr)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([0-9]{5,16}:(?-i:A)[a-z0-9_\-]{34})(?:[\x60'"\s;]|\\[nr]|$)'''
keywords = ["telegram", "telegr", "bot", "token", "key", "telegram_token", "telegram_key"]

[[rules]]
id = "slack-app-token"
description = "Detected a Slack App-level token, risking unauthorized access to Slack applications and workspace data."
regex = '''(?i)xapp-\d-[A-Z0-9]+-\d+-[a-z0-9]+'''
entropy = 2
keywords = ["xapp"]

[[rules]]
id = "slack-bot-token"
description = "Identified a Slack Bot token, which may compromise bot integrations and communication channel security."
regex = '''xoxb-[0-9]{10,13}-[0-9]{10,13}[a-zA-Z0-9-]*'''
entropy = 3
keywords = ["xoxb"]

[[rules]]
id = "slack-config-access-token"
description = "Found a Slack Configuration access token, posing a risk to workspace configuration and sensitive data access."
regex = '''(?i)xoxe.xox[bp]-\d-[A-Z0-9]{163,166}'''
entropy = 2
keywords = [
    "xoxe.xoxb-",
    "xoxe.xoxp-",
]

[[rules]]
id = "slack-config-refresh-token"
description = "Discovered a Slack Configuration refresh token, potentially allowing prolonged unauthorized access to configuration settings."
regex = '''(?i)xoxe-\d-[A-Z0-9]{146}'''
entropy = 2
keywords = ["xoxe-"]

[[rules]]
id = "slack-legacy-bot-token"
description = "Uncovered a Slack Legacy bot token, which could lead to compromised legacy bot operations and data exposure."
regex = '''xoxb-[0-9]{8,14}-[a-zA-Z0-9]{18,26}'''
entropy = 2
keywords = ["xoxb"]

[[rules]]
id = "slack-legacy-token"
description = "Detected a Slack Legacy token, risking unauthorized access to older Slack integrations and user data."
regex = '''xox[os]-\d+-\d+-\d+-[a-fA-F\d]+'''
entropy = 2
keywords = [
    "xoxo",
    "xoxs",
]

[[rules]]
id = "slack-legacy-workspace-token"
description = "Identified a Slack Legacy Workspace token, potentially compromising access to workspace data and legacy features."
regex = '''xox[ar]-(?:\d-)?[0-9a-zA-Z]{8,48}'''
entropy = 2
keywords = [
    "xoxa",
    "xoxr",
]

[[rules]]
id = "slack-user-token"
description = "Found a Slack User token, posing a risk of unauthorized user impersonation and data access within Slack workspaces."
regex = '''xox[pe](?:-[0-9]{10,13}){3}-[a-zA-Z0-9-]{28,34}'''
entropy = 2
keywords = [
    "xoxp-",
    "xoxe-",
]

[[rules]]
id = "slack-webhook-url"
description = "Discovered a Slack Webhook, which could lead to unauthorized message posting and data leakage in Slack channels."
regex = '''(?:https?://)?hooks.slack.com/(?:services|workflows|triggers)/[A-Za-z0-9+/]{43,56}'''
keywords = ["hooks.slack.com"]

[[rules]]
id = "discord-api-token"
description = "Detected a Discord API key, potentially compromising communication channels and user data privacy on Discord."
regex = '''(?i)[\w.-]{0,50}?(?:discord)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-f0-9]{64})(?:[\x60'"\s;]|\\[nr]|$)'''
keywords = ["discord"]

[[rules]]
id = "discord-client-id"
description = "Identified a Discord client ID, which may lead to unauthorized integrations and data exposure in Discord applications."
regex = '''(?i)[\w.-]{0,50}?(?:discord)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([0-9]{18})(?:[\x60'"\s;]|\\[nr]|$)'''
entropy = 2
keywords = ["discord"]

[[rules]]
id = "discord-client-secret"
description = "Discovered a potential Discord client secret, risking compromised Discord bot integrations and data leaks."
regex = '''(?i)[\w.-]{0,50}?(?:discord)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9=_\-]{32})(?:[\x60'"\s;]|\\[nr]|$)'''
entropy = 2
keywords = ["discord"]

