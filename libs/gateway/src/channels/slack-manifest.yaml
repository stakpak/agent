display_information:
  name: Stakpak
  description: AI agent for infrastructure operations
  background_color: "#1a1a2e"

features:
  bot_user:
    display_name: Stakpak
    always_online: true
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false

oauth_config:
  scopes:
    bot:
      # Outbound messaging
      - chat:write

      # Reactions (receipt indicator)
      - reactions:read
      - reactions:write

      # Channel & conversation awareness
      - channels:read
      - groups:read
      - im:read
      - mpim:read

      # Message history (required for inbound messages)
      - channels:history
      - groups:history
      - im:history
      - mpim:history

      # @mention detection
      - app_mentions:read

settings:
  event_subscriptions:
    bot_events:
      - message.channels
      - message.groups
      - message.im
      - app_mention
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
